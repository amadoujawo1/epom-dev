databases:
  - name: epom-db
    databaseName: epom_dev
    user: postgres
    plan: free

services:
  - type: web
    name: epom-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: epom-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: NODE_VERSION
        value: "18.17.0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
